version: '3.8'

services:
  # OpenSearch 单节点（开发环境）
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true  # 开发环境禁用安全插件
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=admin123
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"
    networks:
      - opensearch-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MinIO (S3 兼容存储，开发环境)
  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-27Z
    container_name: minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    networks:
      - opensearch-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 应用服务
  opensearch-file-api:
    build:
      context: ../../
      dockerfile: deployments/docker/Dockerfile
      args:
        VERSION: dev
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: opensearch-file-api
    environment:
      - OPENSEARCH_SERVER_HOST=opensearch
      - OPENSEARCH_SERVER_PORT=9200
      - OPENSEARCH_OPENSEARCH_HOST=opensearch
      - OPENSEARCH_OPENSEARCH_PORT=9200
      - OPENSEARCH_OPENSEARCH_USERNAME=admin
      - OPENSEARCH_OPENSEARCH_PASSWORD=admin123
      - OPENSEARCH_OPENSEARCH_SECURE=false
      - OPENSEARCH_STORAGE_TYPE=local
      - OPENSEARCH_STORAGE_LOCAL_PATH=/app/data/files
      - OPENSEARCH_STORAGE_IMAGE_OCR=true
      - OPENSEARCH_STORAGE_IMAGE_OCR_LANG=eng
      - OPENSEARCH_JWT_SECRET=dev-secret-key-change-in-production
      - OPENSEARCH_SERVER_MODE=debug
      - OPENSEARCH_LOG_LEVEL=debug
      - OPENSEARCH_LOG_FORMAT=console
    ports:
      - "8080:8080"
    volumes:
      - api-data:/app/data/files
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - opensearch-net
    restart: unless-stopped

networks:
  opensearch-net:
    driver: bridge

volumes:
  opensearch-data:
  minio-data:
  api-data:
