server:
  port: 8080
  host: "0.0.0.0"
  mode: "debug"
  read_timeout: "30s"
  write_timeout: "60s"

opensearch:
  host: "localhost"
  port: 9200
  username: "admin"
  password: "admin"
  secure: false  # 开发环境设为 false，生产环境使用 true
  index_prefix: "tenant"

storage:
  type: "local"  # local 或 s3
  local_path: "./data/files"
  # S3 配置（当 type=s3 时使用）
  # s3_bucket: "my-bucket"
  # s3_region: "us-east-1"
  # s3_endpoint: ""  # MinIO 地址，如使用 AWS 留空
  # s3_key_id: ""
  # s3_secret: ""
  # OCR 配置
  image_ocr: true        # 是否启用图片 OCR（Docker 中默认启用）
  image_ocr_lang: "eng"  # OCR 语言：eng(英文), chi_sim(简体中文), jpn(日文) 等

jwt:
  secret: "your-secret-key-change-in-production"
  issuer: "opensearch-file-api"
  expire_time: "24h"

log:
  level: "debug"
  format: "json"  # json 或 console

embedding:
  provider: "openai"  # openai, local, clip
  model: "text-embedding-3-small"  # 或 all-minilm (local), clip (multimodal)
  api_key: "${OPENAI_API_KEY}"  # OpenAI API 密钥，使用本地服务时可留空
  api_url: "https://api.openai.com/v1/embeddings"  # 或本地服务地址如 http://localhost:11434
  dimensions: 1536  # 向量维度
  batch_size: 10  # 批量处理大小
  timeout: 30  # 请求超时 (秒)
